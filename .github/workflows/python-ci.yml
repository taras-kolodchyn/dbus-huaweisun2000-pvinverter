name: Python CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare toolcache for act
        if: ${{ env.ACT }}
        run: |
          echo "RUNNER_TOOL_CACHE=$PWD/.toolcache" >> $GITHUB_ENV
          echo "RUNNER_TEMP=$PWD/.tmp" >> $GITHUB_ENV
          mkdir -p "$PWD/.toolcache" "$PWD/.tmp"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'

      - name: Lint with black
        run: black --check .

      - name: Lint with flake8
        run: flake8 .

      - name: Run tests with coverage
        run: pytest --maxfail=1 --disable-warnings -q --cov=. --cov-report=xml --cov-report=term

      - name: Install/uninstall smoke test
        if: ${{ !env.ACT }}
        run: bash docker/test_install_uninstall.sh

      - name: Docker Compose smoke test
        if: ${{ !env.ACT }}
        run: |
          docker compose -f docker-compose.dev.yml -f docker-compose.install-test.yml up --build --abort-on-container-exit
          docker compose -f docker-compose.dev.yml -f docker-compose.install-test.yml down --volumes --remove-orphans

      - name: Check for README and LICENSE
        run: |
          test -f README.md
          test -f LICENSE

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'

      - name: Run tests with coverage
        run: pytest --maxfail=1 --disable-warnings -q --cov=. --cov-report=xml --cov-report=term

      - name: Get version from git tag
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Verify package version matches git tag
        run: |
          python - <<'PY'
          import os
          from importlib.metadata import version

          expected = os.environ["VERSION"]
          actual = version("dbus-huaweisun2000-pvinverter")
          if actual != expected:
              raise SystemExit(
                  f"Package version {actual!r} does not match release tag {expected!r}"
              )
          PY

      - name: Create Release ZIP
        run: |
          ARCHIVE_NAME="dbus-huaweisun2000-pvinverter-v${VERSION}.zip"
          LATEST_ARCHIVE_NAME="dbus-huaweisun2000-pvinverter.zip"
          git ls-files -z | grep -vz '\.zip$' | xargs -0 zip -qr "$ARCHIVE_NAME"
          cp "$ARCHIVE_NAME" "$LATEST_ARCHIVE_NAME"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dbus-huaweisun2000-pvinverter-v${{ env.VERSION }}.zip
            dbus-huaweisun2000-pvinverter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release download links
        run: |
          VERSIONED_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/dbus-huaweisun2000-pvinverter-v${VERSION}.zip"
          LATEST_URL="https://github.com/${{ github.repository }}/releases/latest/download/dbus-huaweisun2000-pvinverter.zip"
          for url in "$VERSIONED_URL" "$LATEST_URL"; do
            for attempt in 1 2 3 4 5; do
              status=$(curl -L -o /dev/null -s -w '%{http_code}' "$url")
              if [ "$status" = "200" ]; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Download URL failed: $url (status $status)"
                exit 1
              fi
              sleep 3
            done
          done
